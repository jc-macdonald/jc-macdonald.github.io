    "Research Software -- Lead Developer":
      - name: "OP System (Operator-Partitioned System)"
        start_date: 2026
        end_date: present
        summary: "ACCIDDA. Declarative governing equation specification compiler for structured dynamical systems. Transforms YAML model definitions into callable numerics consumed by OP Engine or other solvers."
        highlights:
          - "[github.com/ACCIDDA/op_system](https://github.com/ACCIDDA/op_system)"

      - name: pp-eigentest
        start_date: 2026
        end_date: present
        summary: "Posterior predictive eigenvalue testing framework for determining signal rank in covariance and Gram matrices. Supports ordered hypothesis testing, family-wise error-rate control, and false discovery rate control."
        highlights:
          - "[github.com/jcm-sci/pp-eigentest](https://github.com/jcm-sci/pp-eigentest)"

      - name: "OP Engine (Operator-Partitioned Engine)"
        start_date: 2025
        end_date: present
        summary: "ACCIDDA. Numerical simulation engine for mechanistic models of biological and epidemiological systems. Supports ODE, PDE, and hybrid operator-splitting solvers with pluggable backends."
        highlights:
          - "[github.com/ACCIDDA/op_engine](https://github.com/ACCIDDA/op_engine)"

      - name: vbpca-py
        start_date: 2024
        end_date: present
        summary: "Variational Bayesian PCA for incomplete data with native missing-data handling, uncertainty quantification, and C++-accelerated kernels; compatible with scikit-learn."
        highlights:
          - "[pypi.org/project/vbpca-py/](https://pypi.org/project/vbpca-py/)"

    "Research Software -- Collaborative Infrastructure":
      - name: "FlepiMoP2 (Flexible Epidemic Modeling Pipeline 2)"
        start_date: 2025
        end_date: present
        summary: "ACCIDDA. Core contributor to the redesign of a modular epidemic modeling and simulation pipeline for forecasting and scenario analysis."

      - name: TabularEpi
        start_date: 2025
        end_date: present
        summary: "UNC / ACCIDDA. Rule-based tabular epidemic simulator. Conducted systematic performance benchmarking that identified critical architectural bottlenecks, motivating an ongoing refactor to a vectorized backend."

      - name: "FlepiMoP (Flexible Epidemic Modeling Pipeline)"
        start_date: 2024
        end_date: 2025
        summary: "Hopkins IDD / ACCIDDA. Developed modular ODE solver interfaces; implemented PyMC-based Bayesian inference module for operational influenza modeling; benchmarking identified vectorization-driven performance gains of 5--20x, informing FlepiMoP2 architecture."

