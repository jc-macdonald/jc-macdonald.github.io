repo_descriptions:
  yoavram-lab/VBPCApy: "Variational Bayesian PCA with native missing-data handling and C++-accelerated kernels."
  jcm-sci/pp-eigentest: "Posterior predictive eigenvalue testing for signal rank determination."
  jcm-sci/trade-study: "Multi-objective trade-study orchestration with proper scoring rules and Pareto optimization."
  jcm-sci/TradeStudy.jl: "Julia trade-study harness wrapping Metaheuristics.jl, ParetoSmooth.jl, QuasiMonteCarlo.jl, GlobalSensitivity.jl."
  ACCIDDA/op_engine: "Operator-partitioned solver composing heterogeneous subsystem solvers (ODE, PDE, stochastic, hybrid) into a single time-stepping pipeline."
  ACCIDDA/op_system: "Declarative YAML-to-numerics compiler for structured dynamical systems."
  ACCIDDA/flepimop2: "Modular simulation campaign orchestrator for infectious disease modeling."
